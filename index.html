<!DOCTYPE html>
<html lang="es-ES">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meteorito | Parque de Bolas Valencia</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Jost:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --naranja: #FF6D00; --amarillo: #FFD600; --azul: #2979FF; --morado: #AA00FF; --blanco: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Jost', sans-serif; background-color: #fcfcfc; }
        h1, h2, h3, .bungee { font-family: 'Bungee', cursive; }

        header { background: var(--blanco); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 0 var(--azul); }
        .logo-img { height: 60px; }
        nav a { text-decoration: none; color: var(--azul); font-weight: 800; margin-left: 15px; text-transform: uppercase; font-size: 0.8rem; }

        .section { padding: 60px 5%; text-align: center; }
        
        /* FORMULARIO DE RESERVA */
        .reserva-box { background: var(--blanco); border: 5px solid var(--azul); border-radius: 30px; padding: 30px; max-width: 600px; margin: 30px auto; box-shadow: 10px 10px 0 var(--amarillo); }
        .reserva-box input, .reserva-box select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 2px solid #ddd; font-family: 'Jost'; }
        .btn-enviar { background: var(--verde-wa, #25d366); color: white; border: none; padding: 15px 30px; border-radius: 50px; cursor: pointer; font-family: 'Bungee'; width: 100%; font-size: 1.1rem; margin-top: 10px; }

        /* GALERÍA Y SLIDERS */
        .galeria-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .galeria-item { width: 100%; height: 200px; border-radius: 15px; object-fit: cover; border: 4px solid var(--amarillo); }
        .slider-fotos { display: flex; overflow-x: auto; gap: 10px; padding: 10px; border-radius: 20px; }
        .slider-fotos img { width: 280px; height: 180px; flex-shrink: 0; object-fit: cover; border-radius: 15px; border: 2px solid var(--naranja); }

        /* REDES SOCIALES */
        .social-icons { margin-top: 20px; }
        .social-icons a { font-size: 2rem; margin: 0 10px; color: var(--azul); transition: 0.3s; }
        .social-icons a:hover { color: var(--naranja); }

        footer { background: #222; color: white; padding: 40px 5%; text-align: center; }
        .whatsapp-float { position: fixed; bottom: 20px; right: 20px; background: #25d366; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; z-index: 2000; text-decoration: none; color: white; }
    </style>
</head>
<body>

    <header>
        <div class="logo-box">
            <img src="image_cd91eb.png" alt="Logo" class="logo-img">
        </div>
        <nav>
            <a href="#quienes">¿Quiénes somos?</a>
            <a href="#que">¿Qué hacemos?</a>
            <a href="#galeria">Galería</a>
            <a href="#locales">Locales</a>
            <a href="#reservar">Reservar</a>
        </nav>
    </header>

    <section id="reservar" class="section">
        <h2 style="color:var(--naranja)">¡HAZ TU RESERVA AQUÍ! ☄️</h2>
        <div class="reserva-box">
            <label>¿Qué local prefieres?</label>
            <select id="local">
                <option value="Baleares">Meteorito Baleares (Pintor Maella)</option>
                <option value="Juan Llorens">Meteorito Juan Llorens</option>
            </select>

            <label>¿Qué quieres hacer?</label>
            <select id="motivo" onchange="toggleCumple()">
                <option value="Solo ir a jugar">Solo ir a jugar hoy/mañana</option>
                <option value="Celebrar un Cumple">Celebrar un Cumpleaños</option>
                <option value="Preguntar si está abierto">Preguntar si está abierto</option>
            </select>

            <div id="extra-cumple" style="display:none;">
                <input type="number" id="ninos" placeholder="Número de niños">
                <input type="date" id="fecha">
                <select id="tematica">
                    <option value="Básica">Temática: Básica</option>
                    <option value="SPA">Temática: SPA</option>
                    <option value="Petit Chef">Temática: Petit Chef</option>
                    <option value="Científico">Temática: Científico</option>
                </select>
            </div>

            <button class="btn-enviar" onclick="enviarWhatsapp()">
                <i class="fab fa-whatsapp"></i> ENVIAR A WHATSAPP
            </button>
        </div>
    </section>

    <section id="locales" class="section" style="background:#eee">
        <h2>Nuestros Locales</h2>
        <div style="margin-bottom:40px; background:white; padding:20px; border-radius:20px; border:4px solid var(--azul)">
            <h3>BALEARES</h3>
            <div class="slider-fotos">
                <img src="image_cd9591.png"> <img src="image_cd92c8.png"> <img src="image_cd9288.png">
            </div>
        </div>
        <div style="background:white; padding:20px; border-radius:20px; border:4px solid var(--naranja)">
            <h3>JUAN LLORENS</h3>
            <div class="slider-fotos">
                <img src="image_cd9629.png"> <img src="image_cd9649.png"> <img src="image_cd91eb.png">
            </div>
        </div>
    </section>

    <section id="galeria" class="section">
        <h2>Galería de Fotos</h2>
        <div class="galeria-grid">
            <img src="image_cd9952.jpg" class="galeria-item">
            <img src="image_cd99aa.jpg" class="galeria-item">
            <img src="image_cd91eb.png" class="galeria-item">
        </div>
    </section>

    <footer>
        <h3 class="bungee">¡Síguenos en redes!</h3>
        <div class="social-icons">
            <a href="TU_INSTAGRAM_AQUÍ"><i class="fab fa-instagram"></i></a>
            <a href="TU_FACEBOOK_AQUÍ"><i class="fab fa-facebook"></i></a>
        </div>
        <br>
        <p>&copy; 2024 Meteorito Valencia</p>
    </footer>

    <a href="https://wa.me/34637098967" class="whatsapp-float"><i class="fab fa-whatsapp"></i></a>

    <script>
        function toggleCumple() {
            const motivo = document.getElementById('motivo').value;
            const extra = document.getElementById('extra-cumple');
            extra.style.display = (motivo === "Celebrar un Cumple") ? "block" : "none";
        }

        function enviarWhatsapp() {
            const telefono = "34600000000"; // PON EL DE TU MAMA
            const local = document.getElementById('local').value;
            const motivo = document.getElementById('motivo').value;
            let mensaje = `Hola Meteorito! Quiero información sobre: ${motivo} en el centro de ${local}.`;

            if (motivo === "Celebrar un Cumple") {
                const ninos = document.getElementById('ninos').value;
                const fecha = document.getElementById('fecha').value;
                const tematica = document.getElementById('tematica').value;
                mensaje += ` Seríamos unos ${ninos} niños para el día ${fecha} con la temática ${tematica}.`;
            }

            const url = `https://wa.me/${telefono}?text=${encodeURIComponent(mensaje)}`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
